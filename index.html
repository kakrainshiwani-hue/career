<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPath Max | 2026 Skill Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;600;800&display=swap');
        
        :root { --primary: #fbbf24; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        .light-theme { --bg: #f8fafc; --text: #0f172a; --card-bg: rgba(226, 232, 240, 0.9); }

        body { 
            font-family: 'Bricolage Grotesque', sans-serif; 
            background-color: var(--bg); 
            transition: background 0.3s ease;
        }

        .video-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem; 
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .video-card:hover { transform: translateY(-12px); border-color: #fbbf24; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        
        .watched { border: 3px solid #10b981 !important; position: relative; }
        .watched::after { 
            content: '✓ MASTERED'; 
            position: absolute; top: 15px; left: 15px; 
            background: #10b981; color: white; 
            padding: 6px 14px; border-radius: 10px; 
            font-size: 12px; font-weight: 800; z-index: 20;
        }

        .filter-btn.active { background-color: #fbbf24; color: #000; border-color: #fbbf24; }
        #sidebar { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-hide { transform: translateX(-100%); }
    </style>
</head>
<body class="text-slate-100">

    <!-- SIDEBAR MENU -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-slate-900 border-r border-white/10 z-[300] sidebar-hide p-10">
        <div class="flex justify-between items-center mb-12">
            <h2 class="font-800 text-3xl italic">PRO<span class="text-amber-400">PATH</span></h2>
            <button onclick="toggleMenu()" class="text-3xl hover:text-amber-400 transition">✕</button>
        </div>
        <nav class="space-y-6">
            <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.2em]">User Profile</p>
            <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl mb-4">
                <div class="text-3xl">🔥</div>
                <div>
                    <p class="text-xs opacity-50 font-bold">STREAK</p>
                    <p class="text-xl font-black text-amber-400">4 Days</p>
                </div>
            </div>
            
            <a href="#" class="block p-4 rounded-2xl bg-amber-400 text-black font-extrabold text-lg">🏠 My Dashboard</a>
            <a href="#vault" onclick="toggleMenu()" class="block p-4 rounded-2xl hover:bg-white/5 transition text-lg font-semibold">🚀 Skill Vault</a>
            
            <div class="mt-12 p-6 bg-white/5 rounded-3xl">
                <p class="text-xs uppercase opacity-60 mb-4 font-bold tracking-widest">Mastery Level</p>
                <div class="w-full bg-slate-800 h-3 rounded-full mb-3">
                    <div id="sidebarBar" class="bg-amber-400 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
                </div>
                <p id="sidebarPercent" class="text-sm font-black text-amber-400">0%</p>
            </div>
        </nav>
    </aside>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-[100] bg-slate-900/95 backdrop-blur-xl p-5 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <button onclick="toggleMenu()" class="bg-white/5 p-3 rounded-xl hover:bg-amber-400 hover:text-black transition text-2xl">☰</button>
                <h1 class="font-800 text-2xl tracking-tighter uppercase hidden sm:block">Pro<span class="text-amber-400">Path</span></h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <span id="navStat" class="text-sm font-black text-amber-400 uppercase tracking-tighter">0/55 Complete</span>
                    <div class="w-32 h-1.5 bg-slate-800 rounded-full mt-1.5">
                        <div id="navBar" class="bg-amber-400 h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="toggleTheme()" class="p-3 bg-slate-800 rounded-2xl text-xl hover:bg-slate-700 transition">🌓</button>
            </div>
        </div>
    </nav>

    <!-- HERO & FILTERS -->
    <header class="px-6 py-20 text-center max-w-5xl mx-auto">
        <span class="bg-amber-400/10 text-amber-400 px-6 py-2.5 rounded-full text-sm font-black tracking-[0.3em] uppercase mb-8 inline-block border border-amber-400/20">Learning Experience 2.0</span>
        <h2 class="text-6xl md:text-8xl font-800 leading-[1] mb-10 tracking-tight">Your 2026 <span class="text-amber-400">Vault.</span></h2>
        
        <div class="relative max-w-2xl mx-auto mb-10">
            <input type="text" id="searchInput" onkeyup="searchSkills()" placeholder="Search AI, Hacking, Systems..." 
            class="w-full bg-slate-800/50 border-2 border-white/5 p-6 rounded-[2.5rem] outline-none focus:border-amber-400 focus:ring-8 focus:ring-amber-400/10 transition-all text-lg shadow-2xl">
        </div>

        <!-- CATEGORY FILTERS -->
        <div id="filter-bar" class="flex flex-wrap justify-center gap-3 mb-10">
            <button onclick="filterCat('All')" class="filter-btn active border border-white/10 px-6 py-2 rounded-full text-sm font-bold uppercase transition hover:border-amber-400">All</button>
            <button onclick="filterCat('AI')" class="filter-btn border border-white/10 px-6 py-2 rounded-full text-sm font-bold uppercase transition hover:border-amber-400">AI & Agents</button>
            <button onclick="filterCat('Tech')" class="filter-btn border border-white/10 px-6 py-2 rounded-full text-sm font-bold uppercase transition hover:border-amber-400">Tech & Ops</button>
            <button onclick="filterCat('Security')" class="filter-btn border border-white/10 px-6 py-2 rounded-full text-sm font-bold uppercase transition hover:border-amber-400">Cybersecurity</button>
            <button onclick="filterCat('Future')" class="filter-btn border border-white/10 px-6 py-2 rounded-full text-sm font-bold uppercase transition hover:border-amber-400">Future Tech</button>
        </div>
    </header>

    <!-- SKILL VAULT -->
    <main id="vault" class="max-w-7xl mx-auto px-6 pb-32">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Content Injected via JS -->
        </div>
    </main>

    <!-- AI CHAT MENTOR -->
    <div class="fixed bottom-8 right-8 z-[200]">
        <div id="chat-window" class="hidden w-96 h-[500px] bg-slate-900 border border-white/10 rounded-[2.5rem] shadow-2xl mb-6 flex flex-col overflow-hidden">
            <div class="bg-amber-400 p-6 text-black font-black flex justify-between items-center text-lg">
                <span>CAREER COACH</span>
                <button onclick="toggleChat()" class="text-2xl">✕</button>
            </div>
            <div id="chat-history" class="flex-grow p-6 overflow-y-auto text-sm space-y-5 bg-slate-950/50">
                <div class="bg-slate-800 p-4 rounded-3xl rounded-tl-none leading-relaxed">I've added 15+ new courses! Try asking me about **Quantum Computing** or **Ethical Hacking**.</div>
            </div>
            <div class="p-4 bg-slate-900 border-t border-white/5 flex gap-3">
                <input type="text" id="chatInput" class="bg-slate-800 w-full p-4 rounded-2xl outline-none text-sm" placeholder="Ask anything...">
                <button onclick="askBot()" class="bg-amber-400 text-black px-6 rounded-2xl font-black text-xl hover:scale-105 transition">↑</button>
            </div>
        </div>
        <button onclick="toggleChat()" class="bg-amber-400 text-black w-20 h-20 rounded-full shadow-2xl flex items-center justify-center text-4xl hover:scale-110 transition active:scale-90 border-4 border-slate-900">
            💬
        </button>
    </div>

    <script>
        const skills = [
            // AI & AGENTS
            { id: "InowktzMfK0", title: "7 Free AI Courses for 2026 Mastery", cat: "AI", sal: "$180k" },
            { id: "VfVxJIoQLIA", title: "Agentic AI Roadmap: Building LLM Apps", cat: "AI", sal: "$210k" },
            { id: "mS8_h75M3sw", title: "Machine Learning Full Course 2026", cat: "AI", sal: "$165k" },
            { id: "fUkkXYs2Luo", title: "5 Best AI Certifications (Google/AWS)", cat: "AI", sal: "$175k" },
            { id: "OnL_Y2xrpt4", title: "Deep Learning Foundations (Full Course)", cat: "AI", sal: "$190k" },

            // TECH & OPS
            { id: "lx2g61Xo400", title: "Backend Systems Design for Scale", cat: "Tech", sal: "$180k" },
            { id: "7fPUAi33clw", title: "Next.js 15 Fullstack Course (Next-Gen)", cat: "Tech", sal: "$135k" },
            { id: "a8FFknuJwB0", title: "AWS Cloud Practitioner (Masterclass)", cat: "Tech", sal: "$145k" },
            { id: "8ON249GVD3s", title: "Kubernetes & Docker in 2026", cat: "Tech", sal: "$170k" },
            { id: "iiV_O4Uqj9Q", title: "Modern Data Engineering Roadmap", cat: "Tech", sal: "$160k" },
            { id: "pW_U_pWqM_o", title: "Advanced SQL for Data Analysts", cat: "Tech", sal: "$120k" },

            // CYBERSECURITY
            { id: "gbZfgoBN6tA", title: "Official Cisco Ethical Hacking (Free)", cat: "Security", sal: "$155k" },
            { id: "6_zqDJ9KvZ0", title: "Cybersecurity Roadmap for Beginners", cat: "Security", sal: "$140k" },
            { id: "ug5P8ZCgpnk", title: "Best Free Hacking Resources 2026", cat: "Security", sal: "$160k" },
            { id: "Rgvzt0D8bR4", title: "Become a SOC Analyst (One Video)", cat: "Security", sal: "$130k" },

            // FUTURE TECH
            { id: "tsbCSkvHhMo", title: "Quantum Computing for Absolute Beginners", cat: "Future", sal: "$220k" },
            { id: "7ecKIAKP2Ck", title: "MIT Introduction to Quantum Technology", cat: "Future", sal: "$240k" },
            { id: "M576WGiDBdQ", title: "Web3 & Blockchain Development 2026", cat: "Future", sal: "$195k" },
            { id: "gyMwXuJrbFE", title: "Solidity Smart Contract Masterclass", cat: "Future", sal: "$210k" },
            { id: "eS0_eS0_eS0", title: "AR/VR Development (Unity 6 Engine)", cat: "Future", sal: "$150k" }
        ];

        let watchedSkills = JSON.parse(localStorage.getItem('watchedSkills')) || [];

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(skill => {
                const isWatched = watchedSkills.includes(skill.id) ? 'watched' : '';
                return `
                <div class="video-card ${isWatched}" id="card-${skill.id}">
                    <div class="relative pb-[56.25%] h-0">
                        <iframe class="absolute top-0 left-0 w-full h-full" 
                        src="https://www.youtube.com/embed/${skill.id}" 
                        frameborder="0" allowfullscreen loading="lazy"></iframe>
                    </div>
                    <div class="p-8">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-[10px] font-black bg-amber-400 text-black px-3 py-1 rounded-lg uppercase tracking-widest">${skill.cat}</span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">${skill.sal} AVG</span>
                        </div>
                        <h3 class="font-800 text-xl mb-6 leading-tight min-h-[56px]">${skill.title}</h3>
                        <button onclick="toggleWatched('${skill.id}')" 
                        class="w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-all ${watchedSkills.includes(skill.id) ? 'bg-emerald-500 text-white' : 'bg-white/10 hover:bg-amber-400 hover:text-black'}">
                            ${watchedSkills.includes(skill.id) ? 'Course Completed' : 'Mark as Complete'}
                        </button>
                    </div>
                </div>
            `}).join('');
            updateStats();
        }

        function updateStats() {
            const total = skills.length;
            const completed = watchedSkills.length;
            const percentage = Math.round((completed / total) * 100);
            document.getElementById('navStat').innerText = `${completed}/${total} Complete`;
            document.getElementById('navBar').style.width = percentage + '%';
            document.getElementById('sidebarBar').style.width = percentage + '%';
            document.getElementById('sidebarPercent').innerText = percentage + '% Mastered';
        }

        function filterCat(cat) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if(cat === 'All') render(skills);
            else render(skills.filter(s => s.cat === cat));
        }

        function searchSkills() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(skills.filter(s => s.title.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q)));
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar-hide'); }
        function toggleChat() { document.getElementById('chat-window').classList.toggle('hidden'); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        function toggleWatched(id) {
            watchedSkills.includes(id) ? watchedSkills = watchedSkills.filter(i => i !== id) : watchedSkills.push(id);
            localStorage.setItem('watchedSkills', JSON.stringify(watchedSkills));
            render(skills);
        }

        function askBot() {
            const input = document.getElementById('chatInput');
            const history = document.getElementById('chat-history');
            if(!input.value) return;
            history.innerHTML += `<div class="bg-amber-400 text-black p-4 rounded-3xl rounded-tr-none text-right font-black ml-auto w-fit shadow-lg">${input.value}</div>`;
            const q = input.value.toLowerCase();
            input.value = "";
            setTimeout(() => {
                let reply = "I recommend the **Quantum Computing** course—it's the next big frontier for 2026 salaries.";
                if(q.includes("hack") || q.includes("security")) reply = "I've added the new Cisco Ethical Hacking course to your vault. Check the 'Security' tab!";
                history.innerHTML += `<div class="bg-slate-800 p-4 rounded-3xl rounded-tl-none">Mentor: ${reply}</div>`;
                history.scrollTop = history.scrollHeight;
            }, 600);
        }

        render(skills);
    </script>
</body>
</html>
