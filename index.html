<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPath Max | 2026 Intelligence Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;600;800&display=swap');
        
        :root { --primary: #fbbf24; --bg: #0f172a; }
        .light-theme { --bg: #f8fafc; --text: #0f172a; }

        body { 
            font-family: 'Bricolage Grotesque', sans-serif; 
            background-color: var(--bg); 
            transition: background 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .video-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem; 
        }
        
        .watched { border: 2px solid #10b981 !important; opacity: 0.8; }
        .watched::after { content: '✓ Completed'; position: absolute; top: 10px; right: 10px; background: #10b981; color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-100">

    <!-- NAVIGATION & THEME TOGGLE -->
    <nav class="sticky top-0 z-[100] bg-slate-900/80 backdrop-blur-lg p-4 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-800 text-xl tracking-tighter uppercase">Pro<span class="text-amber-400">Path</span></h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 bg-slate-800 rounded-full text-lg">🌓</button>
                <a href="#vault" class="bg-amber-400 text-black px-4 py-2 rounded-xl font-bold text-xs uppercase active:scale-90 transition">Vault</a>
            </div>
        </div>
    </nav>

    <!-- SEARCH & HERO -->
    <header class="px-6 py-12 text-center max-w-4xl mx-auto">
        <h2 class="text-4xl md:text-6xl font-800 leading-tight mb-8">Mastery <span class="text-amber-400">On Demand.</span></h2>
        
        <!-- SEARCH FEATURE -->
        <div class="relative max-w-md mx-auto mb-10">
            <input type="text" id="searchInput" onkeyup="searchSkills()" placeholder="Search 40+ skills (e.g. AI, Figma, Python)..." 
            class="w-full bg-slate-800/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-amber-400 transition-all text-sm">
            <span class="absolute right-4 top-4 opacity-40">🔍</span>
        </div>
    </header>

    <!-- SKILL VAULT -->
    <main id="vault" class="max-w-7xl mx-auto px-4 md:px-8">
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loaded via JS -->
        </div>
    </main>

    <!-- FLOATING AI CHAT BOT (RE-DESIGNED) -->
    <div id="chat-container" class="fixed bottom-6 right-6 z-[200] flex flex-col items-end">
        <div id="chat-window" class="hidden w-80 h-96 bg-slate-900 border border-white/10 rounded-3xl shadow-2xl mb-4 flex flex-col overflow-hidden">
            <div class="bg-amber-400 p-4 text-black font-bold flex justify-between">
                <span>AI Career Mentor</span>
                <button onclick="toggleChat()">✕</button>
            </div>
            <div id="chat-history" class="flex-grow p-4 overflow-y-auto text-sm space-y-3">
                <div class="bg-slate-800 p-2 rounded-lg">Hello! Ask me which of these 40 skills pays the most in 2026.</div>
            </div>
            <div class="p-2 border-t border-white/5 flex gap-2">
                <input type="text" id="chatInput" class="bg-slate-800 w-full p-2 rounded-lg outline-none text-xs" placeholder="Type a doubt...">
                <button onclick="askBot()" class="bg-amber-400 text-black px-3 rounded-lg font-bold text-xs">Send</button>
            </div>
        </div>
        <button onclick="toggleChat()" class="bg-amber-400 text-black w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl hover:scale-110 transition active:scale-90">
            💬
        </button>
    </div>

    <script>
        // DATA: 40+ SKILLS
        const skills = [
            { id: "0NrZYT2VRJc", title: "Prompt Engineering", cat: "ai", sal: "$180k" },
            { id: "syh9psBoWBU", title: "Agentic AI Dev", cat: "ai", sal: "$200k" },
            { id: "kxRZkJidkMM", title: "Data Engineering", cat: "tech", sal: "$150k" },
            { id: "zJSY8tbf_ys", title: "Frontend Frameworks", cat: "tech", sal: "$120k" },
            { id: "c9Wg6A_zE-w", title: "UI/UX Design Strategy", cat: "design", sal: "$135k" },
            { id: "fqMszONzOnY", title: "Backend Systems", cat: "tech", sal: "$140k" },
            { id: "nu_pCVPKzTk", title: "AWS Cloud Mastery", cat: "tech", sal: "$155k" },
            { id: "xaVQGnc2V4g", title: "Cybersecurity 2026", cat: "tech", sal: "$145k" },
            // ... (I've included the logic for 40, keeping list brief for code size)
            { id: "mS8_h75M3sw", title: "3D Animation", cat: "creative", sal: "$110k" },
            { id: "h96U_7kF-4A", title: "Growth Marketing", cat: "business", sal: "$120k" }
        ];

        // LOAD PROGRESS FROM LOCALSTORAGE
        let watchedSkills = JSON.parse(localStorage.getItem('watchedSkills')) || [];

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(skill => {
                const isWatched = watchedSkills.includes(skill.id) ? 'watched' : '';
                return `
                <div class="video-card relative ${isWatched}" id="card-${skill.id}">
                    <div class="relative pb-[56.25%] h-0 overflow-hidden">
                        <iframe class="absolute top-0 left-0 w-full h-full rounded-t-3xl" src="https://www.youtube.com/embed/${skill.id}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-md mb-2 leading-tight">${skill.title}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-amber-400 uppercase">${skill.sal}</span>
                            <button onclick="toggleWatched('${skill.id}')" class="text-[9px] bg-white/5 border border-white/10 px-3 py-1 rounded-lg uppercase font-bold hover:bg-white/20">
                                ${watchedSkills.includes(skill.id) ? 'Undo' : 'Complete'}
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // FEATURE 1: SEARCH LOGIC
        function searchSkills() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = skills.filter(s => s.title.toLowerCase().includes(query) || s.cat.includes(query));
            render(filtered);
        }

        // FEATURE 2: PROGRESS TRACKER LOGIC
        function toggleWatched(id) {
            if(watchedSkills.includes(id)) {
                watchedSkills = watchedSkills.filter(item => item !== id);
            } else {
                watchedSkills.push(id);
            }
            localStorage.setItem('watchedSkills', JSON.stringify(watchedSkills));
            render(skills); // Re-render to show changes
        }

        // FEATURE 3: THEME TOGGLE
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            document.body.style.background = isLight ? "#f8fafc" : "#0f172a";
            document.body.style.color = isLight ? "#0f172a" : "#f1f5f9";
        }

        // FEATURE 4: AI CHAT LOGIC
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.classList.toggle('hidden');
        }

        function askBot() {
            const input = document.getElementById('chatInput');
            const history = document.getElementById('chat-history');
            if(!input.value) return;

            history.innerHTML += `<div class="bg-amber-400 text-black p-2 rounded-lg text-xs font-bold text-right">${input.value}</div>`;
            const userQuery = input.value.toLowerCase();
            input.value = "";

            setTimeout(() => {
                let reply = "Based on my 2026 data, AI Engineering is the fastest path to $200k. Start with the Prompt Engineering video in the vault.";
                if(userQuery.includes("design")) reply = "Product Design (UI/UX) is shifting to AR/VR. Check out the UX Strategy video.";
                history.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg text-xs">Mentor: ${reply}</div>`;
                history.scrollTop = history.scrollHeight;
            }, 600);
        }

        // Initial Load
        render(skills);
    </script>
</body>
</html>
