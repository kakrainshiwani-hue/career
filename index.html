        .aspect-video { position: relative; padding-bottom: 56.25%; height: 0; }
        .aspect-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Smooth Scroll for Mobile */
        html { scroll-behavior: smooth; }
    </style>
</head>

            grid.innerHTML = data.map(skill => `

                    <div class="aspect-video">
                        <iframe src="https://www.youtube.com/embed/${skill.id}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-lg mb-1 leading-tight">${skill.title}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-[10px] bg-white/5 border border-white/10 px-3 py-1 rounded-full uppercase font-bold text-amber-400">Target: ${skill.sal}</span>

                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            if(cat === 'all') render(skills);
            else render(skills.filter(s => s.cat === cat));
        }

        // Initial Load
        render(skills);
