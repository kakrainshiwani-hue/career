<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProPath Max | 2026 Skill Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;600;800&display=swap');
        
        :root { 
            --primary: #fbbf24; 
            --bg: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        .light-theme { 
            --bg: #ffffff; 
            --card-bg: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: rgba(15, 23, 42, 0.1);
        }

        body { 
            font-family: 'Bricolage Grotesque', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            transition: all 0.3s ease;
            margin-bottom: 70px; /* Space for mobile nav */
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            border: 2px solid var(--border);
            border-radius: 2rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* Progress Circle */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Mobile Bottom Nav (Android Style) */
        @media (min-width: 768px) { .mobile-nav { display: none; } }
        @media (max-width: 767px) { 
            .desktop-sidebar { display: none; }
            .hero-title { font-size: 2.5rem !important; }
        }

        .sidebar-hide { transform: translateX(-100%); }
    </style>
</head>
<body>

    <!-- SIDEBAR (DESKTOP) -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-slate-900 border-r border-white/10 z-[300] sidebar-hide p-8 desktop-sidebar">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-800 text-2xl text-white italic">PRO<span class="text-amber-400">PATH</span></h2>
            <button onclick="toggleMenu()" class="text-white hover:text-amber-400">✕</button>
        </div>
        <div class="space-y-4">
            <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                <p class="text-xs text-amber-400 font-black uppercase mb-2">Mastery Status</p>
                <h4 id="statusText" class="text-white text-xl font-bold">Beginner</h4>
                <div class="w-full bg-slate-800 h-2 rounded-full mt-4">
                    <div id="sideBarProgress" class="bg-amber-400 h-full rounded-full w-0 transition-all duration-1000"></div>
                </div>
            </div>
            <nav class="space-y-2 mt-8">
                <a href="#" class="flex items-center gap-4 p-4 bg-amber-400 text-black rounded-2xl font-bold"><span>🏠</span> Dashboard</a>
                <a href="#" class="flex items-center gap-4 p-4 text-white hover:bg-white/5 rounded-2xl transition"><span>📈</span> Career Analytics</a>
                <a href="#" class="flex items-center gap-4 p-4 text-white hover:bg-white/5 rounded-2xl transition"><span>🏆</span> Certificates</a>
            </nav>
        </div>
    </aside>

    <!-- TOP NAV -->
    <nav class="sticky top-0 z-[100] bg-white/5 backdrop-blur-xl border-b border-[var(--border)] p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="hidden md:block p-3 glass-card hover:bg-amber-400 hover:text-black transition">☰</button>
                <div class="text-2xl font-800 tracking-tighter">PRO<span class="text-amber-400">PATH</span></div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 px-4 py-2 glass-card">
                    <span class="text-amber-500">🔥</span>
                    <span class="font-bold text-sm">4 Day Streak</span>
                </div>
                <button onclick="toggleTheme()" class="p-3 glass-card text-xl">🌓</button>
            </div>
        </div>
    </nav>

    <!-- MOBILE BOTTOM NAV (ANDROID) -->
    <div class="mobile-nav fixed bottom-0 left-0 w-full bg-slate-900 border-t border-white/10 flex justify-around p-4 z-[400]">
        <button onclick="window.scrollTo(0,0)" class="flex flex-col items-center gap-1 text-amber-400">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">HOME</span>
        </button>
        <button onclick="toggleChat()" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">💬</span><span class="text-[10px] font-bold">MENTOR</span>
        </button>
        <button onclick="toggleMenu()" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">👤</span><span class="text-[10px] font-bold">PROFILE</span>
        </button>
    </div>

    <!-- MAIN CONTENT -->
    <header class="px-6 py-12 md:py-20 text-center max-w-5xl mx-auto">
        <h1 class="hero-title text-5xl md:text-8xl font-800 leading-tight mb-8">Elevate your <br><span class="text-amber-400">Skillset.</span></h1>
        
        <!-- Stats Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-4">
                <p class="text-[10px] uppercase font-black opacity-50">Completed</p>
                <p id="statDone" class="text-2xl font-bold">0</p>
            </div>
            <div class="glass-card p-4">
                <p class="text-[10px] uppercase font-black opacity-50">Remaining</p>
                <p id="statLeft" class="text-2xl font-bold">55</p>
            </div>
            <div class="glass-card p-4">
                <p class="text-[10px] uppercase font-black opacity-50">XP Earned</p>
                <p id="statXP" class="text-2xl font-bold">0</p>
            </div>
            <div class="glass-card p-4 border-amber-400/50">
                <p class="text-[10px] uppercase font-black opacity-50">Global Rank</p>
                <p class="text-2xl font-bold text-amber-400">#1.2k</p>
            </div>
        </div>

        <div class="relative max-w-2xl mx-auto mb-8">
            <input type="text" id="searchInput" onkeyup="searchSkills()" placeholder="Search from 55+ Courses..." 
            class="w-full glass-card p-5 md:p-6 outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-400/10 text-lg">
        </div>

        <!-- Filter Chips -->
        <div class="flex overflow-x-auto gap-2 pb-4 no-scrollbar justify-start md:justify-center">
            <button onclick="filterCat('All')" class="whitespace-nowrap px-6 py-2 rounded-full glass-card font-bold text-sm">All</button>
            <button onclick="filterCat('AI')" class="whitespace-nowrap px-6 py-2 rounded-full glass-card font-bold text-sm">AI Agents</button>
            <button onclick="filterCat('Tech')" class="whitespace-nowrap px-6 py-2 rounded-full glass-card font-bold text-sm">Tech & Dev</button>
            <button onclick="filterCat('Future')" class="whitespace-nowrap px-6 py-2 rounded-full glass-card font-bold text-sm">Future Tech</button>
            <button onclick="filterCat('Security')" class="whitespace-nowrap px-6 py-2 rounded-full glass-card font-bold text-sm">Hacking</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Courses Here -->
        </div>
    </main>

    <!-- AI MENTOR WINDOW -->
    <div id="chat-window" class="hidden fixed inset-0 md:inset-auto md:bottom-24 md:right-8 z-[500] w-full md:w-96 h-full md:h-[550px] bg-[var(--bg)] md:glass-card flex flex-col overflow-hidden">
        <div class="bg-amber-400 p-6 text-black font-black flex justify-between items-center">
            <span>AI CAREER MENTOR</span>
            <button onclick="toggleChat()" class="text-2xl">✕</button>
        </div>
        <div id="chat-history" class="flex-grow p-6 overflow-y-auto space-y-4">
            <div class="bg-slate-800 text-white p-4 rounded-3xl rounded-tl-none text-sm">Welcome back! Ready to master one of the 55 new skills today?</div>
        </div>
        <div class="p-4 border-t border-[var(--border)] flex gap-2">
            <input type="text" id="chatInput" class="w-full p-4 glass-card outline-none text-sm" placeholder="Ask about salaries...">
            <button onclick="askBot()" class="bg-amber-400 text-black px-6 rounded-2xl font-bold">↑</button>
        </div>
    </div>

    <script>
        const courses = [
            // AI
            { id: "InowktzMfK0", title: "Generative AI Roadmap 2026", cat: "AI", sal: "$180k" },
            { id: "VfVxJIoQLIA", title: "Building AI Agents (Llama 4)", cat: "AI", sal: "$210k" },
            { id: "fUkkXYs2Luo", title: "AI Certifications Mastery", cat: "AI", sal: "$175k" },
            { id: "mS8_h75M3sw", title: "ML with Python Expert", cat: "AI", sal: "$160k" },
            { id: "OnL_Y2xrpt4", title: "Deep Learning Neural Networks", cat: "AI", sal: "$195k" },
            
            // SECURITY
            { id: "gbZfgoBN6tA", title: "Ethical Hacking Full Course", cat: "Security", sal: "$150k" },
            { id: "6_zqDJ9KvZ0", title: "Cybersecurity Roadmap 2026", cat: "Security", sal: "$140k" },
            { id: "ug5P8ZCgpnk", title: "Web Penetration Testing", cat: "Security", sal: "$165k" },
            { id: "Rgvzt0D8bR4", title: "SOC Analyst Professional", cat: "Security", sal: "$130k" },
            { id: "3Kq1MIfTWCE", title: "Bug Bounty Hunting Guide", cat: "Security", sal: "$200k" },

            // FUTURE TECH
            { id: "tsbCSkvHhMo", title: "Quantum Computing Foundations", cat: "Future", sal: "$220k" },
            { id: "7ecKIAKP2Ck", title: "Quantum Algorithms MIT", cat: "Future", sal: "$250k" },
            { id: "M576WGiDBdQ", title: "Blockchain Architecture", cat: "Future", sal: "$190k" },
            { id: "gyMwXuJrbFE", title: "Solidity 2026 Masterclass", cat: "Future", sal: "$210k" },
            { id: "2aYf0nUfDyo", title: "Spatial Computing (Apple Vision)", cat: "Future", sal: "$180k" },

            // TECH & DEV
            { id: "lx2g61Xo400", title: "Distributed Systems Design", cat: "Tech", sal: "$185k" },
            { id: "7fPUAi33clw", title: "Next.js 15 + React 19", cat: "Tech", sal: "$140k" },
            { id: "a8FFknuJwB0", title: "AWS Cloud Expert 2026", cat: "Tech", sal: "$155k" },
            { id: "8ON249GVD3s", title: "Advanced Kubernetes Ops", cat: "Tech", sal: "$170k" },
            { id: "iiV_O4Uqj9Q", title: "Modern Data Engineering", cat: "Tech", sal: "$160k" }
            // Note: In real use, you'd add all 55 here.
        ];

        let watched = JSON.parse(localStorage.getItem('proPathWatched')) || [];

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(item => {
                const isWatched = watched.includes(item.id);
                return `
                <div class="video-card glass-card overflow-hidden ${isWatched ? 'border-emerald-500' : ''}">
                    <div class="relative pb-[56.25%] bg-black">
                        <iframe class="absolute top-0 left-0 w-full h-full" 
                        src="https://www.youtube.com/embed/${item.id}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-6">
                        <div class="flex gap-2 mb-3">
                            <span class="text-[10px] font-black bg-amber-400 text-black px-2 py-1 rounded-md uppercase">${item.cat}</span>
                            <span class="text-[10px] font-bold opacity-60 uppercase">${item.sal} AVG</span>
                        </div>
                        <h3 class="font-800 text-lg mb-4 h-14 overflow-hidden">${item.title}</h3>
                        <button onclick="toggleWatched('${item.id}')" 
                        class="w-full py-3 rounded-xl font-bold text-sm transition-all ${isWatched ? 'bg-emerald-500 text-white' : 'bg-white/10 hover:bg-amber-400 hover:text-black'}">
                            ${isWatched ? 'MASTERED ✓' : 'MARK COMPLETE'}
                        </button>
                    </div>
                </div>
            `}).join('');
            updateStats();
        }

        function updateStats() {
            const count = watched.length;
            const total = courses.length;
            const perc = (count / total) * 100;
            
            document.getElementById('statDone').innerText = count;
            document.getElementById('statLeft').innerText = total - count;
            document.getElementById('statXP').innerText = count * 500;
            document.getElementById('sideBarProgress').style.width = perc + '%';
            
            const status = count > 15 ? "Expert" : count > 5 ? "Intermediate" : "Beginner";
            document.getElementById('statusText').innerText = status;
        }

        function toggleWatched(id) {
            watched.includes(id) ? watched = watched.filter(i => i !== id) : watched.push(id);
            localStorage.setItem('proPathWatched', JSON.stringify(watched));
            render(courses);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('sidebar-hide'); }
        function toggleChat() { document.getElementById('chat-window').classList.toggle('hidden'); }
        
        function filterCat(cat) {
            if(cat === 'All') render(courses);
            else render(courses.filter(c => c.cat === cat));
        }

        function searchSkills() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(courses.filter(c => c.title.toLowerCase().includes(q)));
        }

        render(courses);
    </script>
</body>
</html>
